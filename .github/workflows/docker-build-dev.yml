name: Dev - Build RECAP Web Proxy (Local Development)
permissions:
  contents: read

on:
  push:
    branches: [ "dev" ]
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - 'documentation/**'
      - 'COMPLIANCE.yaml'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
  # Allow manual workflow triggering
  workflow_dispatch:

env:
  TARGET_ENV: dev
  WORKING_DIRECTORY: ./recap-web-proxy

jobs:
  build-only:
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: '1'
        
    - name: Get short commit SHA
      id: get_commit
      run: |
        echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
    - name: Build Docker image
      run: |
        cd ${{ env.WORKING_DIRECTORY }}
        echo "Building RECAP web proxy for development..."
        docker build --no-cache --pull -t recap-web-proxy:dev .
        docker tag recap-web-proxy:dev recap-web-proxy:${{ steps.get_commit.outputs.SHA_SHORT }}
        
    - name: Test Docker image locally
      run: |
        echo "Testing container startup..."
        docker run --rm --name test-container -d -p 8080:80 recap-web-proxy:dev
        sleep 10
        
        # Test that nginx is responding
        docker exec test-container nginx -t
        if [ $? -eq 0 ]; then
          echo "[SUCCESS] Nginx configuration is valid"
        else
          echo "[ERROR] Nginx configuration error"
          docker logs test-container
          exit 1
        fi
        
        # Clean up test container
        docker stop test-container
        
    - name: List built images
      run: |
        echo "Built images:"
        docker images --filter "reference=recap-web-proxy*" --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"
        
    - name: Development build summary
      run: |
        echo "[SUCCESS] Development build completed successfully!"
        echo "Image: recap-web-proxy:dev"
        echo "Tag: recap-web-proxy:${{ steps.get_commit.outputs.SHA_SHORT }}"
        echo "Commit: ${{ steps.get_commit.outputs.SHA_SHORT }}"
        echo ""
        echo "Note: This is a development build - no deployment to Azure."
        echo "To deploy manually, use the commands in documentation/"