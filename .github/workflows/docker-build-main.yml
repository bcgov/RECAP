name: Main - Build & Deploy RECAP Web Proxy
permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - 'documentation/**'
      - 'COMPLIANCE.yaml'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
  # Allow manual workflow triggering
  workflow_dispatch:

env:
  TARGET_ENV: prod
  AZURE_WEBAPP_NAME: d837ad-prod-recap-webapp
  AZURE_RESOURCE_GROUP: d837ad-prod-networking
  ACR_NAME: d837adprodcontainers
  ACR_REPOSITORY: prod-recap-web-proxy
  WORKING_DIRECTORY: ./recap-web-proxy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: '1'
        
    - name: Get short commit SHA
      id: get_commit
      run: |
        echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
    - name: Build Docker image
      run: |
        cd ${{ env.WORKING_DIRECTORY }}
        docker build --no-cache --pull -t ${{ env.ACR_REPOSITORY }}:latest .
        docker tag ${{ env.ACR_REPOSITORY }}:latest ${{ env.ACR_REPOSITORY }}:${{ steps.get_commit.outputs.SHA_SHORT }}
        
    - name: Test Docker image locally
      run: |
        echo "Testing container startup..."
        docker run --rm --name test-container -d -p 8080:80 ${{ env.ACR_REPOSITORY }}:latest
        sleep 10
        
        # Test that nginx is responding
        docker exec test-container nginx -t
        if [ $? -eq 0 ]; then
          echo "[SUCCESS] Nginx configuration is valid"
        else
          echo "[ERROR] Nginx configuration error"
          docker logs test-container
          exit 1
        fi
        
        # Clean up test container
        docker stop test-container
        
    - name: GitHub Actions validation
      run: |
        echo "[SUCCESS] Build completed successfully - exiting for testing"
        echo "Built image: ${{ env.ACR_REPOSITORY }}:latest"
        echo "Commit SHA: ${{ steps.get_commit.outputs.SHA_SHORT }}"
        exit 0
        
    - name: Check Azure credentials
      id: check_creds
      run: |
        if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
          echo "[INFO] Azure credentials not configured - skipping Azure deployment steps"
          echo "[INFO] To enable automatic deployment, configure these GitHub secrets:"
          echo "   - AZURE_CLIENT_ID"
          echo "   - AZURE_TENANT_ID"  
          echo "   - AZURE_SUBSCRIPTION_ID"
          echo ""
          echo "[INFO] See documentation/RECAP-GitHub-Actions.md for setup instructions"
          echo "[INFO] For now, use manual deployment from documentation/"
          echo "has_creds=false" >> $GITHUB_OUTPUT
        else
          echo "[SUCCESS] Azure credentials are configured"
          echo "has_creds=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Login to Azure using OIDC
      if: steps.check_creds.outputs.has_creds == 'true'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        
    - name: Login to Azure Container Registry
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        az acr login --name ${{ env.ACR_NAME }}
        
    - name: Tag and Push images to ACR
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        # Tag for ACR
        docker tag ${{ env.ACR_REPOSITORY }}:latest ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:latest
        docker tag ${{ env.ACR_REPOSITORY }}:latest ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:stable
        docker tag ${{ env.ACR_REPOSITORY }}:latest ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ steps.get_commit.outputs.SHA_SHORT }}
        
        # Push to ACR
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:latest
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:stable
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:${{ steps.get_commit.outputs.SHA_SHORT }}
        
    - name: Update Azure Web App container image
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        az webapp config container set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --container-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:latest
          
    - name: Restart Azure Web App
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        az webapp restart \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          
    - name: Verify deployment
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        echo "Waiting for deployment to stabilize..."
        sleep 30
        
        # Check health endpoint
        HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz --max-time 10)
        if [ "$HEALTH_STATUS" = "200" ]; then
          echo "[SUCCESS] Health check passed: $HEALTH_STATUS"
        else
          echo "[ERROR] Health check failed: $HEALTH_STATUS"
          exit 1
        fi
        
        # Verify container image update
        az webapp show \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "{state: state, availabilityState: availabilityState, containerSettings: siteConfig.linuxFxVersion}" \
          --output table
          
    - name: Test OpenAI connectivity
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        echo "Testing OpenAI model connectivity..."
        # This would require API key from secrets - commented for now
        # cd ${{ env.WORKING_DIRECTORY }}
        # powershell.exe -File "proxy-llm-basic-test.ps1" -ApiKey "${{ secrets.OPENAI_API_KEY }}" -Environment "prod" -Model "all"
        echo "Note: OpenAI connectivity test requires API key configuration"
        
    - name: Azure deployment summary
      if: steps.check_creds.outputs.has_creds == 'true'
      run: |
        echo "[SUCCESS] Production deployment completed successfully!"
        echo "Web App: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "Container: ${{ env.ACR_NAME }}.azurecr.io/${{ env.ACR_REPOSITORY }}:latest"
        echo "Commit: ${{ steps.get_commit.outputs.SHA_SHORT }}"
        
    - name: Build summary
      if: always()
      run: |
        echo "[SUCCESS] Docker build completed successfully!"
        echo "Built image: ${{ env.ACR_REPOSITORY }}:latest"
        echo "Commit: ${{ steps.get_commit.outputs.SHA_SHORT }}"
        if [ "${{ steps.check_creds.outputs.has_creds }}" != "true" ]; then
          echo ""
          echo "[INFO] To enable automatic Azure deployment:"
          echo "1. Configure Azure service principal (see documentation/RECAP-GitHub-Actions.md)"
          echo "2. Add GitHub secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID"
          echo "3. Use manual deployment from documentation/ for now"
        fi